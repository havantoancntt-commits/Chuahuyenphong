    <!-- Polyfills & Critical Fixes for Social Media In-App Browsers -->
    <script>
      (function() {
        // Polyfills
        window.global = window;
        window.process = { 
          env: { NODE_ENV: 'production' }, 
          version: '', 
          versions: {}, 
          platform: 'browser',
          nextTick: function(fn) { setTimeout(fn, 0); }
        };
        window.Buffer = window.Buffer || { isBuffer: function() { return false; } };
        
        // Dynamic Meta Tags to fix sharing issues on Vercel/Social Media
        var currentUrl = window.location.href;
        var origin = window.location.origin;
        
        // Update canonical and OG tags dynamically if they exist
        function updateMeta() {
          var canonical = document.querySelector('link[rel="canonical"]');
          if (canonical) canonical.setAttribute('href', currentUrl);
          
          var ogUrl = document.querySelector('meta[property="og:url"]');
          if (ogUrl) ogUrl.setAttribute('content', currentUrl);
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', updateMeta);
        } else {
          updateMeta();
        }

        // Global Error Handling
        window.addEventListener('error', function(e) {
          console.error('Critical Error:', e);
          var root = document.getElementById('root');
          // Only show error if app hasn't rendered anything yet
          if (root && !root.innerHTML.trim()) {
            document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#000;color:#f59e0b;font-family:serif;text-align:center;padding:20px;">' +
              '<h1 style="font-size:2rem;margin-bottom:1rem;letter-spacing:0.2em;">HUYỀN PHONG PHẬT ĐẠO</h1>' +
              '<p style="opacity:0.8;margin-bottom:2rem;font-style:italic;">Đang gặp sự cố kỹ thuật. Vui lòng tải lại trang hoặc kiểm tra kết nối mạng.</p>' +
              '<button onclick="window.location.reload()" style="background:linear-gradient(to right, #b45309, #d97706);color:#fff;border:none;padding:12px 30px;border-radius:99px;font-weight:bold;cursor:pointer;box-shadow:0 0 20px rgba(217,119,6,0.4);text-transform:uppercase;letter-spacing:0.1em;">Tải lại trang</button>' +
              '<div style="margin-top:3rem;font-size:0.6rem;opacity:0.2;max-width:80%;word-break:break-all;">' + e.message + '</div>' +
              '</div>';
          }
        });
      })();
    </script>
